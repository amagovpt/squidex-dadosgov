services:
  squidex_mongo:
    # Pinned major for reproducible deploys (Squidex supports MongoDB 6/7).
    image: mongo:7
    container_name: squidex_mongo
    volumes:
      - squidex_mongo_data:/data/db
    networks:
      - squidex_net
    restart: unless-stopped

  squidex_app:
    # TODO: pin to a specific Squidex release tag (e.g. squidex/squidex:7.x)
    # once the target version is confirmed; `latest` makes deploys non-reproducible.
    image: squidex/squidex:7.23.0
    container_name: squidex_app
    ports:
      - '8080:80'
    env_file:
      - .env
    environment:
      - URLS__BASEPATH=/squidex
      - URLS__BASEURL=${SQUIDEX_PROTOCOL}://${SQUIDEX_DOMAIN}
      - EVENTSTORE__MONGODB__CONFIGURATION=mongodb://squidex_mongo
      - STORE__MONGODB__CONFIGURATION=mongodb://squidex_mongo
      - IDENTITY__ADMINEMAIL=${SQUIDEX_ADMIN_EMAIL}
      - IDENTITY__ADMINPASSWORD=${SQUIDEX_ADMIN_PASSWORD}
      - IDENTITY__GOOGLESECRET=
      - IDENTITY__GITHUBSECRET=
      - IDENTITY__MICROSOFTSECRET=
      - PLUGINS__0=
    depends_on:
      - squidex_mongo
    volumes:
      - squidex_assets:/app/Assets
    networks:
      - squidex_net
    restart: unless-stopped

networks:
  squidex_net:
    driver: bridge

volumes:
  squidex_mongo_data:
  squidex_assets:
