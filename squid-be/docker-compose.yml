services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - '3333:3333'
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    # Logs go to stdout; the json-file driver rotates them so they never grow
    # unbounded (replaces the old ./access.log bind mount).
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    networks:
      - default
      - squidex_net

networks:
  default:
    driver: bridge
  squidex_net:
    external: true
    name: squidex_squidex_net
